<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Realtime Wafer AI Detection</title>

<style>
body{
  margin:0;
  background:#111;
  font-family:Arial, sans-serif;
  color:white;
}

header{
  height:54px;
  background:#0b0b0b;
  border-bottom:1px solid #333;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

h1{
  font-size:18px;
  margin:0;
  color:#00d4ff;
}

.status{
  font-size:14px;
  color:#39ff14;
}

.main{
  height:calc(100vh - 54px);
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

.ai-view{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.ai-view img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
}

.badge{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(0,0,0,0.7);
  border:1px solid #00d4ff;
  color:#00d4ff;
  padding:8px 14px;
  border-radius:6px;
  font-size:14px;
  font-weight:bold;
}

.footer{
  position:absolute;
  bottom:18px;
  right:20px;
  background:rgba(0,0,0,0.65);
  padding:8px 12px;
  border-radius:6px;
  font-size:13px;
  color:#ddd;
}
</style>
</head>

<body>

<header>
  <h1>Realtime Wafer Defect AI Detection</h1>
  <div class="status">
    CAM: {{ 'LIVE' if camera_ok else 'OFF' }} | AI DETECTION ACTIVE
  </div>
</header>

<div class="main">
  <div class="ai-view">
    {% if camera_ok %}
      <img src="/video_feed_ai">
      <div class="badge">AI DEFECT DETECTION</div>
      <div class="footer">particle · scratch · stain</div>
    {% else %}
      <h2>Camera Offline</h2>
    {% endif %}
  </div>
</div>

</body>
</html>
